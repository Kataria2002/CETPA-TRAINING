<!DOCTYPE html>
<html>
<head>
    <title>Forms</title>
</head>
<body>

<h1>FORMS</h1>

<form>

    <label>Name</label>
    <input type="text" placeholder="Name">
    <br><br>

    <label>Email-id</label>
    <input type="email" placeholder="Email-id">
    <br><br>

    <label>Password</label>
    <input type="password" placeholder="Password">
    <br><br>

    <h3>Language</h3>

    <input type="radio" name="lang"> HTML <br>
    <input type="radio" name="lang"> CSS <br>
    <input type="radio" name="lang"> JS

    <br><br>

    <h3>Course</h3>

    <input type="checkbox"> Java Stack <br>
    <input type="checkbox"> Data Science <br>
    <input type="checkbox"> Mern Stack

    <br><br>

    <label>Field:</label>
    <br><br>

    <select>
        <option>Select</option>
        <option>Frontend</option>
        <option>Backend</option>
        <option>Full Stack</option>
    </select>

    <br><br>

    <textarea rows="3" cols="25"
        placeholder="Describe yourself"></textarea>

    <br><br>

    <label>Date</label>
    <br><br>

    <input type="date">

    <br><br>

    <label>Phone No.</label>
    <input type="tel" placeholder="Phone NO.">

    <br><br>

    <input type="submit" value="submit">

</form>

<br>

</body>
</html>
